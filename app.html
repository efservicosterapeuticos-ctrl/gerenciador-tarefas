<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minhas Tarefas</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.3/Sortable.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <h2>Gerenciador</h2>
      <nav class="admin-nav">
        <button class="nav-tab active" data-view="kanban">Kanban</button>
        <button class="nav-tab" data-view="dashboard">Dashboard</button>
      </nav>
    </div>
    <div class="topbar-right">
      <span id="user-name"></span>
      <button class="btn btn-ghost" id="logout-btn">Sair</button>
    </div>
  </header>

  <main class="main-content">

    <!-- VIEW KANBAN -->
    <section id="view-kanban" class="view-content active">
      <div class="filters">
        <select id="filter-status">
          <option value="">Todos os status</option>
          <option value="pendente">Pendente</option>
          <option value="em_andamento">Em andamento</option>
          <option value="concluida">Concluída</option>
        </select>
        <select id="filter-prioridade">
          <option value="">Todas as prioridades</option>
          <option value="alta">Alta</option>
          <option value="media">Média</option>
          <option value="baixa">Baixa</option>
        </select>
      </div>
      <div id="tasks-container" class="kanban-board">
        <p class="loading">Carregando tarefas...</p>
      </div>
    </section>

    <!-- VIEW DASHBOARD -->
    <section id="view-dashboard" class="view-content hidden">
      <div id="dashboard-container">
        <p class="loading">Carregando dashboard...</p>
      </div>
    </section>

  </main>

  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/tasks.js"></script>
  <script src="js/pipelines.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/dashboard.js"></script>
  <script>
    (async () => {
      const sessao = getSessao();
      if (!sessao) { window.location.href = 'index.html'; return; }
      if (sessao.perfil === 'admin') { window.location.href = 'admin.html'; return; }

      document.getElementById('user-name').textContent = sessao.nome;
      document.getElementById('logout-btn').addEventListener('click', () => {
        logout();
        window.location.href = 'index.html';
      });

      await carregarTarefasUsuario(sessao.id);

      ['filter-status', 'filter-prioridade'].forEach(id => {
        document.getElementById(id).addEventListener('change', () => aplicarFiltros());
      });

      document.querySelectorAll('.nav-tab[data-view]').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.nav-tab[data-view]').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden'));
          tab.classList.add('active');
          document.getElementById(`view-${tab.dataset.view}`).classList.remove('hidden');

          if (tab.dataset.view === 'dashboard') {
            renderDashboardUsuario(_tarefasCache, sessao.nome);
          }
        });
      });
    })();
  </script>
</body>
</html>
