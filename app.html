<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Tarefas — Grupo Elis Formaio</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.3/Sortable.min.js"></script>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="brand">Grupo Elis Formaio</div>
      <div class="event-tag">Gerenciador de Tarefas</div>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-view="kanban">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Tarefas
      </button>
      <button class="nav-item" data-view="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Dashboard
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="sf-label">Usuário</div>
      <div class="sf-value" id="sidebar-user-name"></div>
      <button class="sf-logout" id="logout-btn">Sair →</button>
      <div class="theme-picker-label">Tema</div>
      <div class="theme-picker">
        <button class="theme-dot theme-elis" data-theme="elis" title="Elis (padrão)"></button>
        <button class="theme-dot theme-noite" data-theme="noite" title="Noite"></button>
        <button class="theme-dot theme-nevoa" data-theme="nevoa" title="Névoa"></button>
      </div>
    </div>
  </aside>

  <!-- SIDEBAR OVERLAY (mobile) -->
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <button class="hamburger-btn" id="hamburger-btn" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span class="topbar-title" id="topbar-title">Tarefas</span>

      <button class="btn-mostrar-filtros hidden" id="btn-mostrar-filtros" onclick="toggleFiltros()" title="Mostrar filtros">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
        Filtros
      </button>

      <div class="topbar-right" id="topbar-filters">
        <input type="search" id="search-tarefas" class="search-input" placeholder="Buscar..." />
        <select id="filter-usuario"><option value="">Todos</option></select>
        <select id="filter-status" class="filters" style="margin:0">
          <option value="">Todos os status</option>
          <option value="pendente">A Fazer</option>
          <option value="em_andamento">Em Andamento</option>
          <option value="concluida">Concluído</option>
        </select>
        <select id="filter-prioridade" class="filters" style="margin:0">
          <option value="">Todas as prioridades</option>
          <option value="alta">Alta</option>
          <option value="media">Média</option>
          <option value="baixa">Baixa</option>
        </select>
        <button class="btn btn-outline btn-sm" onclick="window.print()">PDF</button>
        <button class="btn btn-gold" onclick="abrirModalNovaTarefa()">+ Nova Tarefa</button>
        <button class="btn-ocultar-filtros" onclick="toggleFiltros()" title="Ocultar faixa">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <!-- Sino de notificações (sempre visível) -->
      <div class="notif-bell-wrap" id="notif-wrap">
        <button class="notif-bell" id="notif-btn" onclick="toggleNotifDropdown()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="notif-badge hidden" id="notif-badge">0</span>
        </button>
        <div class="notif-dropdown hidden" id="notif-dropdown">
          <div class="notif-header">
            <span>Notificações</span>
            <button onclick="marcarTodasLidas()">Marcar lidas</button>
          </div>
          <div id="notif-list"><p class="notif-empty">Carregando...</p></div>
        </div>
      </div>
    </div>

    <div class="main-content">

      <section id="view-kanban" class="view-content active">
        <div id="tasks-container" class="kanban-board">
          <p class="loading">Carregando tarefas...</p>
        </div>
      </section>

      <section id="view-dashboard" class="view-content hidden">
        <div id="dashboard-container">
          <p class="loading">Carregando dashboard...</p>
        </div>
      </section>

    </div>
  </div>

  <!-- FAB mobile: Nova Tarefa -->
  <button class="fab" id="fab-nova-tarefa" onclick="abrirModalNovaTarefa()">+</button>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" id="modal-content"></div>
  </div>

  <script src="js/theme.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/notificacoes.js"></script>
  <script src="js/tasks.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/dashboard.js"></script>
  <script>
    (async () => {
      const sessao = getSessao();
      if (!sessao) { window.location.href = 'index.html'; return; }
      if (sessao.perfil === 'admin') { window.location.href = 'admin.html'; return; }

      document.getElementById('sidebar-user-name').textContent = sessao.nome;
      document.getElementById('logout-btn').addEventListener('click', () => {
        logout();
        window.location.href = 'index.html';
      });

      // Theme picker
      const temaCurrent = localStorage.getItem('gt-tema') || 'noite';
      document.querySelectorAll('.theme-dot').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.theme === temaCurrent);
        btn.addEventListener('click', () => aplicarTema(btn.dataset.theme));
      });

      // Mobile sidebar
      function toggleSidebar() {
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        const open = sidebar.classList.toggle('sidebar-open');
        overlay.classList.toggle('active', open);
      }
      document.getElementById('hamburger-btn').addEventListener('click', toggleSidebar);
      document.getElementById('sidebar-overlay').addEventListener('click', () => {
        document.querySelector('.sidebar').classList.remove('sidebar-open');
        document.getElementById('sidebar-overlay').classList.remove('active');
      });

      // Filtros toggle
      window.toggleFiltros = function() {
        const el = document.getElementById('topbar-filters');
        const showBtn = document.getElementById('btn-mostrar-filtros');
        const oculto = el.classList.toggle('filters-ocultos');
        showBtn.classList.toggle('hidden', !oculto);
        localStorage.setItem('gt-filtros-ocultos', oculto ? '1' : '0');
      };
      if (localStorage.getItem('gt-filtros-ocultos') === '1') {
        document.getElementById('topbar-filters').classList.add('filters-ocultos');
        document.getElementById('btn-mostrar-filtros').classList.remove('hidden');
      }

      await carregarUsuariosApp();
      await carregarTarefasTodas();
      iniciarRealtimeTarefas();

      await carregarNotificacoes(sessao.id);
      iniciarRealtimeNotificacoes(sessao.id);

      ['filter-status', 'filter-prioridade'].forEach(id => {
        document.getElementById(id).addEventListener('change', () => aplicarFiltros());
      });
      document.getElementById('search-tarefas').addEventListener('input', () => aplicarFiltros());

      document.querySelectorAll('.nav-item[data-view]').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.nav-item[data-view]').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.view-content').forEach(v => {
            v.classList.add('hidden');
            v.classList.remove('view-animate');
          });
          tab.classList.add('active');
          const view = tab.dataset.view;
          const viewEl = document.getElementById(`view-${view}`);
          viewEl.classList.remove('hidden');
          requestAnimationFrame(() => viewEl.classList.add('view-animate'));
          document.getElementById('topbar-title').textContent = view === 'kanban' ? 'Tarefas' : 'Dashboard';

          if (window.innerWidth <= 768) {
            document.querySelector('.sidebar').classList.remove('sidebar-open');
            const ov = document.getElementById('sidebar-overlay');
            if (ov) ov.classList.remove('active');
          }

          if (window.innerWidth > 768) {
            const filterWrap = document.getElementById('topbar-filters');
            const oculto = filterWrap && filterWrap.classList.contains('filters-ocultos');
            if (filterWrap && !oculto) filterWrap.style.display = view === 'kanban' ? 'flex' : 'none';
          }

          if (view === 'dashboard') renderDashboardGeral(_tarefasCache, _usuariosApp);
        });
      });
    })();
  </script>
</body>
</html>
