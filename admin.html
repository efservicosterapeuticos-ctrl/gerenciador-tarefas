<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Grupo Elis Formaio</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.3/Sortable.min.js"></script>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="brand">Grupo Elis Formaio</div>
      <div class="event-tag">Painel Administrativo</div>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item" data-tab="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Dashboard
      </button>
      <button class="nav-item active" data-tab="tarefas">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Tarefas
      </button>
      <button class="nav-item" data-tab="pipelines">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Pipelines
      </button>
      <button class="nav-item" data-tab="usuarios">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Usuários
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="sf-label">Administrador</div>
      <div class="sf-value" id="sidebar-user-name"></div>
      <button class="sf-logout" id="logout-btn">Sair →</button>
      <button class="sf-logout" style="margin-top:4px" onclick="abrirConfiguracoesAdmin()">Configurações ⚙</button>
      <div class="theme-picker-label">Tema</div>
      <div class="theme-picker">
        <button class="theme-dot theme-elis" data-theme="elis" title="Elis (padrão)"></button>
        <button class="theme-dot theme-noite" data-theme="noite" title="Noite"></button>
        <button class="theme-dot theme-nevoa" data-theme="nevoa" title="Névoa"></button>
      </div>
    </div>
  </aside>

  <!-- SIDEBAR OVERLAY (mobile) -->
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <button class="hamburger-btn" id="hamburger-btn" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span class="topbar-title" id="topbar-title">Tarefas</span>
      <div class="topbar-right" id="topbar-actions" style="display:flex">
        <input type="search" id="search-tarefas" class="search-input" placeholder="Buscar tarefas..." />
        <select id="filter-pipeline"><option value="">Todos os pipelines</option></select>
        <select id="filter-usuario"><option value="">Todos os usuários</option></select>
        <select id="filter-status">
          <option value="">Todos os status</option>
          <option value="pendente">Pendente</option>
          <option value="em_andamento">Em andamento</option>
          <option value="concluida">Concluída</option>
        </select>
        <button class="btn btn-outline btn-sm" id="btn-exportar-pdf">PDF</button>
        <button class="btn btn-gold" id="btn-nova-tarefa">+ Nova Tarefa</button>
      </div>

      <!-- Sino de notificações (sempre visível) -->
      <div class="notif-bell-wrap" id="notif-wrap">
        <button class="notif-bell" id="notif-btn" onclick="toggleNotifDropdown()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="notif-badge hidden" id="notif-badge">0</span>
        </button>
        <div class="notif-dropdown hidden" id="notif-dropdown">
          <div class="notif-header">
            <span>Notificações</span>
            <button onclick="marcarTodasLidas()">Marcar lidas</button>
          </div>
          <div id="notif-list"><p class="notif-empty">Carregando...</p></div>
        </div>
      </div>
    </div>

    <div class="main-content">

      <!-- ABA DASHBOARD -->
      <section id="tab-dashboard" class="tab-content hidden">
        <div id="dashboard-container">
          <p class="loading">Carregando dashboard...</p>
        </div>
      </section>

      <!-- ABA TAREFAS -->
      <section id="tab-tarefas" class="tab-content active">
        <div id="tasks-container" class="kanban-board">
          <p class="loading">Carregando tarefas...</p>
        </div>
      </section>

      <!-- ABA PIPELINES -->
      <section id="tab-pipelines" class="tab-content hidden">
        <div class="section-header">
          <h3>Pipelines</h3>
          <button class="btn btn-primary" id="btn-novo-pipeline">+ Novo Pipeline</button>
        </div>
        <div id="pipelines-container" class="pipelines-list"></div>
      </section>

      <!-- ABA USUÁRIOS -->
      <section id="tab-usuarios" class="tab-content hidden">
        <div class="section-header">
          <h3>Controle de Usuários</h3>
          <button class="btn btn-primary" id="btn-novo-usuario">+ Novo Usuário</button>
        </div>
        <div id="usuarios-container" class="usuarios-list"></div>
      </section>

    </div>
  </div>

  <!-- MODAL -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" id="modal-content"></div>
  </div>

  <script src="js/theme.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/notificacoes.js"></script>
  <script src="js/tasks.js"></script>
  <script src="js/pipelines.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/dashboard.js"></script>
  <script>
    (async () => {
      const sessao = getSessao();
      if (!sessao) { window.location.href = 'index.html'; return; }
      if (sessao.perfil !== 'admin') { window.location.href = 'app.html'; return; }

      document.getElementById('sidebar-user-name').textContent = sessao.nome;
      document.getElementById('logout-btn').addEventListener('click', () => {
        logout();
        window.location.href = 'index.html';
      });

      // Theme picker
      const temaCurrent = localStorage.getItem('gt-tema') || 'elis';
      document.querySelectorAll('.theme-dot').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.theme === temaCurrent);
        btn.addEventListener('click', () => aplicarTema(btn.dataset.theme));
      });

      // Mobile sidebar
      function toggleSidebar() {
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        const open = sidebar.classList.toggle('sidebar-open');
        overlay.classList.toggle('active', open);
      }
      document.getElementById('hamburger-btn').addEventListener('click', toggleSidebar);
      document.getElementById('sidebar-overlay').addEventListener('click', () => {
        document.querySelector('.sidebar').classList.remove('sidebar-open');
        document.getElementById('sidebar-overlay').classList.remove('active');
      });

      iniciarAdmin();

      const sessaoNotif = getSessao();
      await carregarNotificacoes(sessaoNotif.id);
      iniciarRealtimeNotificacoes(sessaoNotif.id);
    })();
  </script>
</body>
</html>
